<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != "" %}{{ page.title }} &middot; {{ site.title }}{% else %}{{ site.title }} &mdash; {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">
  <link rel="stylesheet" href="{{ '/assets/css/theme.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {%- feed_meta %}
  {%- if page.math %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script>
    // pandoc --katex emits <span class="math inline|display">raw LaTeX</span>
    // (no delimiters), so render each .math span directly. The deferred KaTeX
    // script runs before DOMContentLoaded, so katex is available here.
    document.addEventListener("DOMContentLoaded", function () {
      if (!window.katex) return;
      document.querySelectorAll(".math").forEach(function (el) {
        try {
          katex.render(el.textContent, el, {
            displayMode: el.classList.contains("display"),
            throwOnError: false
          });
        } catch (e) { /* leave raw on error */ }
      });
    });
  </script>
  {%- endif %}
</head>
<body>
  {%- include nav.html %}
  {{ content }}
  {%- include footer.html %}
</body>
</html>
